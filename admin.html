<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File to GitHub</title>
</head>
<body>
    <h1>Upload File to GitHub</h1>
    
    <form id="uploadForm">
        <label for="fileInput">Choose file to upload:</label>
        <input type="file" id="fileInput" name="file" required>
        <br><br>
        <input type="submit" value="Upload File">
    </form>
    
    <script>
        document.getElementById('uploadForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            // GitHub API variables
            const repoOwner = 'limondasplus';  // Your GitHub username
            const repoName = 'limondasplus.github.io';  // Your repository name
            const accessToken = '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';  // Your GitHub personal access token
            const branchName = 'main';  // Branch to upload the file (you can change it to another branch if necessary)

            // Get the file from the input
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select a file.");
                return;
            }

            // Read the file as a base64 string
            const reader = new FileReader();
            reader.onloadend = async function () {
                const base64Content = reader.result.split(',')[1]; // Get base64 content without metadata
                
                // GitHub API URL to create or update a file
                const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${file.name}`;
                
                // Prepare the payload for the API request
                const payload = {
                    message: `Upload ${file.name}`, // Commit message
                    content: base64Content,  // Base64 encoded file content
                    branch: branchName
                };

                // Make the API request to upload the file
                const response = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('File uploaded successfully!');
                } else {
                    const errorData = await response.json();
                    alert(`Error uploading file: ${errorData.message}`);
                }
            };

            // Read the file as a base64 string
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
